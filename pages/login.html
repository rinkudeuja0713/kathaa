<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathaa — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1714 0%, #2d251f 100%);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1000px;
      width: 100%;
      align-items: center;
    }

    .login-left {
      padding: 40px;
    }

    .login-left h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 64px;
      color: var(--warm-gold);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .login-left .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: #d4a373;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .login-left p {
      color: var(--muted-text);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .login-right {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 129, 58, 0.2);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .login-form-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--body-text);
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted-text);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(14, 11, 8, 0.6);
      border: 1px solid rgba(212, 129, 58, 0.2);
      border-radius: 8px;
      color: var(--body-text);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--warm-gold);
      background: rgba(14, 11, 8, 0.8);
      box-shadow: 0 0 0 3px rgba(212, 129, 58, 0.1);
    }

    .form-group input::placeholder {
      color: rgba(212, 129, 58, 0.4);
    }

    .signin-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--warm-gold) 0%, #c8a96e 100%);
      border: none;
      border-radius: 8px;
      color: #1a1714;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .signin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 129, 58, 0.3);
    }

    .signin-btn:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212, 129, 58, 0.2);
    }

    .divider-text {
      color: var(--muted-text);
      font-size: 12px;
      font-weight: 500;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: rgba(66, 133, 244, 0.15);
      border: 1px solid rgba(66, 133, 244, 0.3);
      border-radius: 8px;
      color: #4285F4;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .google-btn:hover {
      background: rgba(66, 133, 244, 0.25);
      border-color: rgba(66, 133, 244, 0.5);
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
    }

    .signup-link a {
      color: var(--warm-gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .signup-link a:hover {
      color: #c8a96e;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      background: rgba(212, 129, 58, 0.1);
      border: 1px solid rgba(212, 129, 58, 0.2);
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(200, 50, 50, 0.1);
      border-color: rgba(200, 50, 50, 0.2);
      color: #ff6b6b;
    }

    .message.success {
      background: rgba(50, 150, 100, 0.1);
      border-color: rgba(50, 150, 100, 0.2);
      color: #51cf66;
    }

    @media (max-width: 768px) {
      .login-container {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .login-left {
        padding: 20px;
        text-align: center;
      }

      .login-left h1 {
        font-size: 48px;
      }

      .login-right {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="katha-wrapper">
    <header class="site-header">
      <div class="logo-area">
        <span class="diya-icon">🪔</span>
        <span class="brand-name">Kathaa</span>
        <span class="brand-sub">कथा</span>
      </div>
      <nav class="primary-nav">
        <a href="../home.html" class="nav-link">Home</a>
        <a href="feed.html" class="nav-link">Stories</a>
        <a href="groups.html" class="nav-link">Groups</a>
        <a href="professionals.html" class="nav-link nav-link-support">Get support</a>
        <a href="profile.html" class="nav-link">My space</a>
        <a href="login.html" class="nav-link">Login</a>
      </nav>
    </header>
  <div class="login-container">
    <!-- Left Section: Branding -->
    <div class="login-left">
      <h1>कथा</h1>
      <div class="subtitle">Kathaa</div>
      <p>Share your stories anonymously. Connect with others who understand.</p>
      <p>Your voice matters. Your identity is safe with us.</p>
    </div>

    <!-- Right Section: Login Form -->
    <div class="login-right">
      <div class="login-form-title">Sign In</div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email or Phone</label>
          <input type="text" id="email" placeholder="Enter your email or phone number" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="signin-btn">Sign In</button>
      </form>

      <div class="divider">
        <span class="divider-text">OR</span>
      </div>

      <button id="googleSignInBtn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div id="message" class="message"></div>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBO2bzjwUo52rYAtAxqA04i3F_a_IDQejE",
      authDomain: "kathaa-385a3.firebaseapp.com",
      projectId: "kathaa-385a3",
      storageBucket: "kathaa-385a3.firebasestorage.app",
      messagingSenderId: "52566990780",
      appId: "1:52566990780:web:e64147c95474885acbd5b9",
      measurementId: "G-TFZG6F1VZR"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // Anonymous username generator (Reddit-style)
    const anonymousAdjectives = ['Silent', 'Calm', 'Gentle', 'Brave', 'Wise', 'True', 'Pure', 'Free', 'Bright', 'Warm', 'Deep', 'Clear', 'Still', 'Swift', 'Strong', 'Humble', 'Noble', 'Kind'];
    const anonymousNouns = ['Diya', 'Flame', 'Echo', 'River', 'Mountain', 'Stone', 'Wind', 'Star', 'Moon', 'Sun', 'Tree', 'Soul', 'Heart', 'Light', 'Path', 'Voice', 'Seed', 'Breath'];

    function generateAnonymousUsername() {
      const adjective = anonymousAdjectives[Math.floor(Math.random() * anonymousAdjectives.length)];
      const noun = anonymousNouns[Math.floor(Math.random() * anonymousNouns.length)];
      const number = Math.floor(Math.random() * 1000);
      return `${adjective}${noun}${number}`;
    }

    function saveAnonymousUsername(username) {
      localStorage.setItem('kathaa_anonymous_username', username);
    }

    // DOM elements
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');
    const googleBtn = document.getElementById('googleSignInBtn');

    // Helper to display messages
    function showMessage(text, isError = true) {
      messageDiv.classList.add('show');
      messageDiv.classList.toggle('error', isError);
      messageDiv.classList.toggle('success', !isError);
      messageDiv.innerText = text;
    }

    // Email/Password login
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showMessage('Please enter both email and password.', true);
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          const anonUsername = generateAnonymousUsername();
          saveAnonymousUsername(anonUsername);
          showMessage('Login successful! Redirecting...', false);
          setTimeout(() => {
            globalThis.location.href = '../index.html';
          }, 1500);
        })
        .catch((error) => {
          let errorMessage = '';
          switch (error.code) {
            case 'auth/user-not-found':
              errorMessage = 'No account found with this email.';
              break;
            case 'auth/wrong-password':
              errorMessage = 'Incorrect password. Please try again.';
              break;
            case 'auth/invalid-email':
              errorMessage = 'Invalid email address.';
              break;
            case 'auth/too-many-requests':
              errorMessage = 'Too many failed attempts. Please try again later.';
              break;
            default:
              errorMessage = 'Sign-in failed. Please check your credentials.';
          }
          showMessage(errorMessage, true);
        });
    });

    // Google Sign-In
    googleBtn.addEventListener('click', () => {
      signInWithPopup(auth, googleProvider)
        .then(() => {
          const anonUsername = generateAnonymousUsername();
          saveAnonymousUsername(anonUsername);
          showMessage('Google sign-in successful! Redirecting...', false);
          setTimeout(() => {
            globalThis.location.href = '../index.html';
          }, 1500);
        })
        .catch((error) => {
          let errorMessage = '';
          if (error.code === 'auth/popup-blocked') {
            errorMessage = 'Popup was blocked. Please allow popups for this site.';
          } else if (error.code === 'auth/cancelled-popup-request') {
            errorMessage = 'Sign-in cancelled.';
          } else {
            errorMessage = 'Google sign-in failed. Please try again.';
          }
          showMessage(errorMessage, true);
        });
    });
  </script>
</body>
</html>
