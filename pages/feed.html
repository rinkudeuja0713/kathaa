<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathaa — Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    /* Premium toast styling */
    .katha-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      max-width: 320px;
      background: var(--bg-card);
      border-left: 4px solid var(--amber-cta);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(200,169,110,0.2);
      backdrop-filter: blur(8px);
      z-index: 1000;
      animation: toastSlideIn 0.3s ease-out forwards;
      font-family: 'DM Sans', sans-serif;
      color: var(--body-text);
    }
    .katha-toast .toast-message {
      font-size: 0.9rem;
      line-height: 1.4;
    }
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastFadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }
    .katha-toast.fade-out {
      animation: toastFadeOut 0.3s ease-in forwards;
    }
    @media (max-width: 600px) {
      .katha-toast {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        max-width: none;
      }
    }
  </style>
</head>
<body data-enable-didi="true">
  <div class="katha-wrapper">
    <header class="site-header">
      <div class="logo-area"><span class="diya-icon">🪔</span><span class="brand-name">Kathaa</span><span class="brand-sub">कथा</span></div>
      <nav class="primary-nav">
        <a href="../index.html" class="nav-link">Home</a>
        <a href="feed.html" class="nav-link active">Stories</a>
        <a href="tracker.html" class="nav-link">Safe spaces</a>
        <a href="professionals.html" class="nav-link nav-link-support">Get support</a>
        <a href="profile.html" class="nav-link">My space</a>
        <a href="../home.html" class="nav-link" id="navLogout" style="opacity: 0; pointer-events: none;">Logout</a>
      </nav>
    </header>
    <main style="padding: 1.5rem 2rem;">
      <div class="warm-card" style="margin-bottom: 2rem;">
        <h2 class="serif-heading" style="margin-bottom: 0.5rem;">share your kathaa</h2>
        <textarea id="postTextarea" class="post-textarea" rows="3" placeholder="Your story is safe here. No names, no judgement — speak freely..."></textarea>
        <div class="tag-group" id="tagSelector">
          <button data-tag="harassed" class="mood-tag">Harassed</button>
          <button data-tag="silenced" class="mood-tag">Silenced</button>
          <button data-tag="blamed" class="mood-tag">Blamed</button>
          <button data-tag="domestic" class="mood-tag">Domestic abuse</button>
          <button data-tag="assault" class="mood-tag">Assault</button>
        </div>
        <button id="publishPostBtn" class="btn-primary" style="margin-top: 0.5rem;">Post anonymously</button>
        <div id="validationArea"></div>
      </div>

      <div class="filter-bar" style="display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
        <button data-filter="all" class="filter-chip active">All stories</button>
        <button data-filter="harassed" class="filter-chip">Harassed</button>
        <button data-filter="silenced" class="filter-chip">Silenced</button>
        <button data-filter="blamed" class="filter-chip">Blamed</button>
        <button data-filter="domestic" class="filter-chip">Domestic abuse</button>
        <button data-filter="assault" class="filter-chip">Assault</button>
      </div>

      <div id="feedContainer" class="feed-grid" style="display: flex; flex-direction: column; gap: 1rem;"></div>

      <div class="warm-card" style="margin-top: 2rem;">
        <h3 class="serif-heading" style="font-size: 1.4rem;">gentle support</h3>
        <div id="supportSuggestions" class="support-grid"></div>
      </div>
    </main>
    <footer class="site-footer"><p>a safe harbor for the heart — कथा · every story matters</p></footer>
  </div>

  <script type="module">
    import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBO2bzjwUo52rYAtAxqA04i3F_a_IDQejE",
      authDomain: "kathaa-385a3.firebaseapp.com",
      projectId: "kathaa-385a3",
      storageBucket: "kathaa-385a3.firebasestorage.app",
      messagingSenderId: "52566990780",
      appId: "1:52566990780:web:e64147c95474885acbd5b9",
      measurementId: "G-TFZG6F1VZR"
    };

    const authApp = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(authApp);
    const navLogout = document.getElementById('navLogout');

    navLogout.addEventListener('click', async (event) => {
      event.preventDefault();

      try {
        navLogout.style.pointerEvents = 'none';
        await signOut(auth);
        localStorage.setItem('kathaa.auth.hint', 'logged_out');
      } finally {
        window.location.replace('../home.html');
      }
    });

    navLogout.style.opacity = '1';
    navLogout.style.pointerEvents = 'auto';
  </script>
  <script src="../js/auth.js"></script>
  <script src="../js/posts.js"></script>
  <script type="module">
    import { getPosts, createPost, getAISuggestion } from '../js/api.js';

    let currentFilter = 'all';
    let selectedTags = [];

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function renderFeed() {
      let posts;
      if (currentFilter === 'all') {
        posts = await getPosts();
      } else {
        const all = await getPosts();
        posts = all.filter(p => p.tags.includes(currentFilter));
      }
      const container = document.getElementById('feedContainer');
      if (!posts.length) {
        container.innerHTML = '<div class="warm-card" style="text-align:center;">No stories yet. Be the first to share.</div>';
        return;
      }
      const allPosts = await getPosts();
      container.innerHTML = posts.map(post => {
        const similarCount = allPosts.filter(p => {
          if (p.id === post.id) return false;
          const timestamp = new Date(p.timestamp).getTime();
          const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
          if (timestamp < oneWeekAgo) return false;
          return p.tags.some(tag => post.tags.includes(tag));
        }).length;
        return `
          <div class="warm-card">
            <div style="display:flex; gap:1rem; align-items:center; margin-bottom:0.6rem;">
              <span style="font-size:0.7rem; color:var(--muted-text);">${new Date(post.timestamp).toLocaleString()}</span>
            </div>
            <p style="margin-bottom:0.8rem;">${escapeHtml(post.text)}</p>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.4rem;">
              ${post.tags.map(t => `<span style="background:rgba(200,169,110,0.1); padding:0.2rem 0.7rem; border-radius:20px; font-size:0.7rem;">#${t}</span>`).join('')}
            </div>
            <div class="post-count" style="font-size:0.8rem; color:var(--warm-gold);">${similarCount} people feel this way this week</div>
          </div>
        `;
      }).join('');
    }

    function updateTagSelection() {
      document.querySelectorAll('#tagSelector .mood-tag').forEach(btn => {
        const tag = btn.dataset.tag;
        if (selectedTags.includes(tag)) btn.classList.add('selected');
        else btn.classList.remove('selected');
      });
    }

    function renderSupportSuggestions() {
      const suggestions = [
        { title: "You are believed", desc: "What happened to you was not your fault. You deserve to be heard." },
        { title: "Grounding breath", desc: "Inhale 4 sec, hold 4, exhale 4 — repeat 5 times to feel safe in your body." },
        { title: "Nepal helpline", desc: "Women's Rehabilitation Centre (WOREC): 01-4269995. You can call." },
        { title: "Be gentle with yourself", desc: "Healing is not linear. Rest, cry, and come back — all of it is allowed." }
      ];
      const container = document.getElementById('supportSuggestions');
      container.innerHTML = suggestions.map(s => `
        <div class="support-card">
          <strong style="color:var(--warm-gold);">${s.title}</strong>
          <p style="font-size:0.8rem; margin-top:0.3rem;">${s.desc}</p>
        </div>
      `).join('');
    }

    const WAITING_MESSAGES = [
      "Holding your kathaa safely...",
      "Your story is being cradled in gentle hands...",
      "Gathering warmth for your heart..."
    ];

    const FALLBACK_VALIDATIONS = [
      "What happened to you was not your fault. You are believed.",
      "Speaking up takes immense courage. You are not alone in this.",
      "Your voice matters. The silence ends here, with you.",
      "You did nothing wrong. The shame belongs to those who hurt you.",
      "So many women carry this quietly. You sharing helps others feel less alone.",
      "You are brave. You are worthy of safety, of dignity, of justice.",
      "Your story matters. You matter. Kathaa holds you with care.",
      "Healing looks different for everyone. Be gentle with yourself today."
    ];

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function showToast(message, duration = 5000, hasButton = false) {
      const existing = document.querySelector('.katha-toast');
      if (existing) existing.remove();

      if (!message || message.trim() === '') message = "You are heard. You are not alone.";

      const toast = document.createElement('div');
      toast.className = 'katha-toast';

      const buttonHTML = hasButton ? `
        <button onclick="this.closest('.katha-toast').classList.add('fade-out'); setTimeout(() => this.closest('.katha-toast').remove(), 300);" style="
          background: var(--warm-gold);
          color: var(--bg-dark);
          border: none;
          padding: 0.4rem 1rem;
          border-radius: 6px;
          font-weight: 500;
          cursor: pointer;
          font-size: 0.85rem;
          margin-top: 0.6rem;
          transition: all 0.2s;
        " onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">I see you</button>
      ` : '';

      toast.innerHTML = `
        <div style="display: flex; align-items: flex-start; gap: 0.6rem; flex-direction: column;">
          <div class="toast-message">${escapeHtml(message)}</div>
          ${buttonHTML}
        </div>
      `;
      document.body.appendChild(toast);

      if (!hasButton) {
        setTimeout(() => {
          if (toast.parentElement) {
            toast.classList.add('fade-out');
            setTimeout(() => {
              if (toast.parentElement) toast.remove();
            }, 300);
          }
        }, duration);
      }
    }

    async function fetchAISuggestionText(text) {
      try {
        const response = await getAISuggestion(text);
        const suggestion = response && response.suggestion ? response.suggestion.trim() : '';
        return suggestion || null;
      } catch (err) {
        console.warn('AI suggestion failed:', err);
        return null;
      }
    }

    // Post button
    const postBtn = document.getElementById('publishPostBtn');
    if (postBtn) {
      postBtn.onclick = async () => {
        const text = document.getElementById('postTextarea').value.trim();
        if (!text) { alert('Please share something from your heart.'); return; }
        if (selectedTags.length === 0) { alert('Choose a tag so your story finds similar souls.'); return; }

        try {
          if (!window.kathaaAuth || typeof window.kathaaAuth.getUserId !== 'function') {
            alert('Authentication error. Please refresh the page.');
            return;
          }
          const userId = window.kathaaAuth.getUserId();

          showToast(randomFrom(WAITING_MESSAGES), 5000, true);

          const postData = {
            text,
            tags: selectedTags,
            authorId: userId,
            timestamp: new Date().toISOString()
          };
          await createPost(postData);

          if (window.kathaaPosts && typeof window.kathaaPosts.addNewPost === 'function') {
            window.kathaaPosts.addNewPost(text, selectedTags, userId);
          }

          document.getElementById('postTextarea').value = '';
          selectedTags = [];
          updateTagSelection();
          await renderFeed();

          showToast('Your story is shared. Gathering a gentle thought...', 5000, true);

          let suggestion = await fetchAISuggestionText(text);
          if (!suggestion) {
            suggestion = randomFrom(FALLBACK_VALIDATIONS);
          }

          showToast(suggestion, 5000, true);

          const valDiv = document.getElementById('validationArea');
          valDiv.innerHTML = `
            <div class="glow-validate">
              Your story has been heard. You are not alone.<br>
              <em>${escapeHtml(suggestion)}</em>
            </div>
          `;
          setTimeout(() => { valDiv.innerHTML = ''; }, 5000);
        } catch (err) {
          console.error('Error posting story:', err);
          showToast('Could not save your kathaa. Please ensure the support service is running.', 5000);
          alert('Could not post. Make sure the backend is running at http://localhost:5000');
        }
      };
    } else {
      console.error('Post button not found!');
    }

    // Tag selection listeners
    document.querySelectorAll('#tagSelector .mood-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const tagVal = btn.dataset.tag;
        if (selectedTags.includes(tagVal)) {
          selectedTags = selectedTags.filter(t => t !== tagVal);
        } else {
          if (selectedTags.length < 2) selectedTags.push(tagVal);
          else alert('You can add up to 2 tags');
        }
        updateTagSelection();
      });
    });

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', async () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        await renderFeed();
      });
    });

    // Initial render
    renderFeed();
    renderSupportSuggestions();
  </script>
  <script src="../js/didi.js"></script>
</body>
</html>
