<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathaa — Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    .katha-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      max-width: 320px;
      background: var(--bg-card);
      border-left: 4px solid var(--amber-cta);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(200,169,110,0.2);
      backdrop-filter: blur(8px);
      z-index: 1000;
      animation: toastSlideIn 0.3s ease-out forwards;
      font-family: 'DM Sans', sans-serif;
      color: var(--body-text);
    }
    .katha-toast .toast-message {
      font-size: 0.9rem;
      line-height: 1.4;
    }
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastFadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }
    .katha-toast.fade-out {
      animation: toastFadeOut 0.3s ease-in forwards;
    }
    @media (max-width: 600px) {
      .katha-toast {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="katha-wrapper">
    <header class="site-header">
      <div class="logo-area">
        <span class="diya-icon">🪔</span>
        <span class="brand-name">Kathaa</span>
        <span class="brand-sub">कथा</span>
      </div>
      <nav class="primary-nav">
        <!-- Populated dynamically by auth-check.js -->
      </nav>
    </header>

    <main class="feed-page">
      <div class="feed-inner">
        <section class="warm-card feed-composer-card">
          <div class="feed-composer-head">
            <div class="feed-composer-title-block">
              <h2 class="feed-composer-title">Naya Kathaa</h2>
              <p class="feed-composer-title-ne nepali-text" lang="ne">नयाँ कथा</p>
            </div>
            <span class="feed-composer-hint">Anonymous · up to 2 tags</span>
          </div>
          <textarea id="postTextarea" class="post-textarea" rows="2" placeholder="Your story is safe here. No names, no judgement — speak freely..."></textarea>
          <div class="tag-group" id="tagSelector">
            <button type="button" data-tag="harassed" class="mood-tag">Harassed</button>
            <button type="button" data-tag="silenced" class="mood-tag">Silenced</button>
            <button type="button" data-tag="blamed" class="mood-tag">Blamed</button>
            <button type="button" data-tag="domestic" class="mood-tag">Domestic abuse</button>
            <button type="button" data-tag="assault" class="mood-tag">Assault</button>
          </div>
          <div class="feed-composer-actions">
            <button type="button" id="publishPostBtn" class="btn-primary">Post anonymously</button>
          </div>
          <div id="validationArea"></div>
        </section>

        <div class="feed-filter-bar">
          <button type="button" data-filter="all" class="filter-chip active">All</button>
          <button type="button" data-filter="harassed" class="filter-chip">Harassed</button>
          <button type="button" data-filter="silenced" class="filter-chip">Silenced</button>
          <button type="button" data-filter="blamed" class="filter-chip">Blamed</button>
          <button type="button" data-filter="domestic" class="filter-chip">Domestic</button>
          <button type="button" data-filter="assault" class="filter-chip">Assault</button>
        </div>

        <div id="feedContainer" class="feed-stream"></div>

        <section class="warm-card feed-support-section">
          <h3 class="serif-heading" style="font-size: 1.25rem; margin-bottom: 0.35rem;">Gentle support</h3>
          <p style="font-size: 0.8rem; color: var(--muted-text); margin-bottom: 0.85rem;">Small reminders when you need them</p>
          <div id="supportSuggestions" class="support-grid"></div>
        </section>
      </div>
    </main>
    <footer class="site-footer"><p>a safe harbor for the heart — कथा · every story matters</p></footer>
  </div>

  <script type="module" src="../js/auth-check.js"></script>
  <script type="module">
    import { getPosts, createPost, getAISuggestion } from '../js/api.js';
    import { getUserId, logout } from '../js/auth.js';

    const navLogout = document.getElementById('navLogout');
    if (navLogout) {
      navLogout.addEventListener('click', (e) => {
        e.preventDefault();
        logout();
      });
    }

    const AVATAR_EMOJIS = ['🪔', '🪷', '🌸', '🕊️', '✨', '🌙', '🌿', '💫', '🏔️', '🌊'];
    const ADJ = ['Quiet', 'Gentle', 'Brave', 'Soft', 'Warm', 'Kind', 'Calm', 'Silent'];
    const NOUN = ['River', 'Lotus', 'Light', 'Harbor', 'Star', 'Cloud', 'Bloom', 'Path'];

    function hashString(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
      return h;
    }

    function displayForAuthor(authorId) {
      const me = getUserId();
      let stored = null;
      try {
        const raw = localStorage.getItem('kathaa_user');
        if (raw) stored = JSON.parse(raw);
      } catch (e) { /* ignore */ }
      if (stored && authorId && authorId === stored.email) {
        return {
          avatar: stored.anon_avatar || '🪔',
          name: stored.anon_name || 'You',
          isYou: true
        };
      }
      if (!authorId) {
        return { avatar: '🪔', name: 'Anonymous', isYou: false };
      }
      const h = hashString(String(authorId));
      const avatar = AVATAR_EMOJIS[Math.abs(h) % AVATAR_EMOJIS.length];
      const name = `${ADJ[Math.abs(h >> 8) % ADJ.length]} ${NOUN[Math.abs(h >> 16) % NOUN.length]}`;
      return { avatar, name, isYou: false };
    }

    function formatPostTime(iso) {
      try {
        const d = new Date(iso);
        const t = Date.now() - d.getTime();
        const sec = Math.floor(t / 1000);
        if (sec < 45) return 'Just now';
        if (sec < 3600) return Math.floor(sec / 60) + 'm';
        if (sec < 86400) return Math.floor(sec / 3600) + 'h';
        if (sec < 604800) return Math.floor(sec / 86400) + 'd';
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      } catch (e) {
        return '';
      }
    }

    let currentFilter = 'all';
    let selectedTags = [];

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function renderFeed() {
      let posts;
      if (currentFilter === 'all') {
        posts = await getPosts();
      } else {
        const all = await getPosts();
        posts = all.filter(p => (p.tags || []).includes(currentFilter));
      }
      const container = document.getElementById('feedContainer');
      if (!posts.length) {
        container.innerHTML = '<div class="feed-empty-state">No stories in this view yet. Share yours above — someone else may feel less alone.</div>';
        return;
      }
      const allPosts = await getPosts();
      container.innerHTML = posts.map(post => {
        const similarCount = allPosts.filter(p => {
          if (p.id === post.id) return false;
          const timestamp = new Date(p.timestamp).getTime();
          const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
          if (timestamp < oneWeekAgo) return false;
          return (p.tags || []).some(tag => (post.tags || []).includes(tag));
        }).length;
        const who = displayForAuthor(post.authorId);
        const youBadge = who.isYou ? '<span class="feed-post-you">You</span>' : '';
        const tags = (post.tags || []).map(t =>
          `<span class="feed-post-tag">#${escapeHtml(t)}</span>`
        ).join('');
        const postId = String(post.id);
        let warmthSent = false;
        try {
          warmthSent = !!localStorage.getItem('kathaa_warmth_' + postId);
        } catch (e) { /* ignore */ }
        const warmthBtn = warmthSent
          ? '<button type="button" class="feed-warmth-btn sent" disabled aria-label="Warmth already sent">✓ Warmth sent</button>'
          : `<button type="button" class="feed-warmth-btn" data-post-id="${postId}" aria-label="Send anonymous warmth to this story"><span class="feed-post-action-icon" aria-hidden="true">♡</span> Send warmth</button>`;
        return `
          <article class="feed-post-card" data-post-id="${postId}">
            <header class="feed-post-header">
              <div class="feed-post-avatar" aria-hidden="true">${who.avatar}</div>
              <div class="feed-post-meta">
                <div class="feed-post-name">${escapeHtml(who.name)}${youBadge}</div>
                <span class="feed-post-time">${formatPostTime(post.timestamp)}</span>
              </div>
              <span class="feed-post-more" aria-hidden="true">⋯</span>
            </header>
            <div class="feed-post-body">${escapeHtml(post.text)}</div>
            <div class="feed-post-tags">${tags}</div>
            <div class="feed-post-stats"><strong>${similarCount}</strong> similar hearts this week</div>
            <div class="feed-post-actions">${warmthBtn}<p class="feed-warmth-hint">Anonymous support · saved on this device only</p></div>
          </article>
        `;
      }).join('');
    }

    function warmthKey(postId) {
      return 'kathaa_warmth_' + postId;
    }

    document.getElementById('feedContainer').addEventListener('click', (e) => {
      const btn = e.target.closest('.feed-warmth-btn');
      if (!btn || btn.disabled || btn.classList.contains('sent')) return;
      const id = btn.getAttribute('data-post-id');
      if (!id) return;
      try {
        if (localStorage.getItem(warmthKey(id))) return;
        localStorage.setItem(warmthKey(id), '1');
      } catch (err) {
        console.warn(err);
      }
      btn.classList.add('sent');
      btn.disabled = true;
      btn.innerHTML = '✓ Warmth sent';
      showToast('Your warmth was sent anonymously. Small acts of care still count.', 4500, false);
    });

    function updateTagSelection() {
      document.querySelectorAll('#tagSelector .mood-tag').forEach(btn => {
        const tag = btn.dataset.tag;
        if (selectedTags.includes(tag)) btn.classList.add('selected');
        else btn.classList.remove('selected');
      });
    }

    function renderSupportSuggestions() {
      const suggestions = [
        { title: 'You are believed', desc: 'What happened to you was not your fault. You deserve to be heard.' },
        { title: 'Grounding breath', desc: 'Inhale 4 sec, hold 4, exhale 4 — repeat 5 times to feel safe in your body.' },
        { title: 'Nepal helpline', desc: "Women's Rehabilitation Centre (WOREC): 01-4269995. You can call." },
        { title: 'Be gentle with yourself', desc: 'Healing is not linear. Rest, cry, and come back — all of it is allowed.' }
      ];
      const container = document.getElementById('supportSuggestions');
      container.innerHTML = suggestions.map(s => `
        <div class="support-card">
          <strong style="color:var(--warm-gold);">${escapeHtml(s.title)}</strong>
          <p style="font-size:0.8rem; margin-top:0.3rem;">${escapeHtml(s.desc)}</p>
        </div>
      `).join('');
    }

    const WAITING_MESSAGES = [
      'Holding your kathaa safely...',
      'Your story is being cradled in gentle hands...',
      'Gathering warmth for your heart...'
    ];

    const FALLBACK_VALIDATIONS = [
      'What happened to you was not your fault. You are believed.',
      'Speaking up takes immense courage. You are not alone in this.',
      'Your voice matters. The silence ends here, with you.',
      'You did nothing wrong. The shame belongs to those who hurt you.',
      'So many women carry this quietly. You sharing helps others feel less alone.',
      'You are brave. You are worthy of safety, of dignity, of justice.',
      'Your story matters. You matter. Kathaa holds you with care.',
      'Healing looks different for everyone. Be gentle with yourself today.'
    ];

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function showToast(message, duration = 5000, hasButton = false) {
      const existing = document.querySelector('.katha-toast');
      if (existing) existing.remove();

      if (!message || message.trim() === '') message = 'You are heard. You are not alone.';

      const toast = document.createElement('div');
      toast.className = 'katha-toast';

      const buttonHTML = hasButton ? `
        <button type="button" onclick="this.closest('.katha-toast').classList.add('fade-out'); setTimeout(() => this.closest('.katha-toast').remove(), 300);" style="
          background: var(--warm-gold);
          color: var(--bg-dark);
          border: none;
          padding: 0.4rem 1rem;
          border-radius: 6px;
          font-weight: 500;
          cursor: pointer;
          font-size: 0.85rem;
          margin-top: 0.6rem;
          transition: all 0.2s;
        " onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">I see you</button>
      ` : '';

      toast.innerHTML = `
        <div style="display: flex; align-items: flex-start; gap: 0.6rem; flex-direction: column;">
          <div class="toast-message">${escapeHtml(message)}</div>
          ${buttonHTML}
        </div>
      `;
      document.body.appendChild(toast);

      if (!hasButton) {
        setTimeout(() => {
          if (toast.parentElement) {
            toast.classList.add('fade-out');
            setTimeout(() => {
              if (toast.parentElement) toast.remove();
            }, 300);
          }
        }, duration);
      }
    }

    async function fetchAISuggestionText(text) {
      try {
        const response = await getAISuggestion(text);
        const suggestion = response && response.suggestion ? response.suggestion.trim() : '';
        return suggestion || null;
      } catch (err) {
        console.warn('AI suggestion failed:', err);
        return null;
      }
    }

    const postBtn = document.getElementById('publishPostBtn');
    if (postBtn) {
      postBtn.onclick = async () => {
        const text = document.getElementById('postTextarea').value.trim();
        if (!text) { alert('Please share something from your heart.'); return; }
        if (selectedTags.length === 0) { alert('Choose a tag so your story finds similar souls.'); return; }

        try {
          const userId = getUserId();
          if (!userId) {
            alert('Please sign in to post.');
            return;
          }

          showToast(randomFrom(WAITING_MESSAGES), 5000, true);

          const postData = {
            text,
            tags: selectedTags,
            authorId: userId,
            timestamp: new Date().toISOString()
          };
          await createPost(postData);

          document.getElementById('postTextarea').value = '';
          selectedTags = [];
          updateTagSelection();
          await renderFeed();

          showToast('Your story is shared. Gathering a gentle thought...', 5000, true);

          let suggestion = await fetchAISuggestionText(text);
          if (!suggestion) {
            suggestion = randomFrom(FALLBACK_VALIDATIONS);
          }

          showToast(suggestion, 5000, true);

          const valDiv = document.getElementById('validationArea');
          valDiv.innerHTML = `
            <div class="glow-validate" style="margin-top:0.75rem;">
              Your story has been heard. You are not alone.<br>
              <em>${escapeHtml(suggestion)}</em>
            </div>
          `;
          setTimeout(() => { valDiv.innerHTML = ''; }, 5000);
        } catch (err) {
          console.error('Error posting story:', err);
          showToast('Could not save your kathaa. Please ensure the support service is running.', 5000);
          alert('Could not post. Make sure the backend is running (e.g. http://127.0.0.1:5001)');
        }
      };
    }

    document.querySelectorAll('#tagSelector .mood-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const tagVal = btn.dataset.tag;
        if (selectedTags.includes(tagVal)) {
          selectedTags = selectedTags.filter(t => t !== tagVal);
        } else {
          if (selectedTags.length < 2) selectedTags.push(tagVal);
          else alert('You can add up to 2 tags');
        }
        updateTagSelection();
      });
    });

    document.querySelectorAll('.feed-filter-bar .filter-chip').forEach(chip => {
      chip.addEventListener('click', async () => {
        document.querySelectorAll('.feed-filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        await renderFeed();
      });
    });

    renderFeed();
    renderSupportSuggestions();
  </script>
  <script src="../js/didi.js"></script>
</body>
</html>
